<svg viewBox="0 0 900 620" xmlns="http://www.w3.org/2000/svg" role="img" font-family="Arial, sans-serif">
  <title>AR Social Media Camera – System Architecture</title>
  <desc>System architecture diagram showing the flow from Mobile App through Face Detection to Firebase Backend and User Profiles.</desc>

  <!-- Background -->
  <rect width="900" height="620" fill="#F8F9FA" rx="12"/>

  <!-- Title -->
  <text x="450" y="38" text-anchor="middle" font-size="18" font-weight="bold" fill="#1F4E79">AR Social Media Camera — System Architecture</text>

  <!-- ===== LAYER LABELS ===== -->
  <text x="30" y="110" font-size="11" fill="#888" font-weight="bold">CLIENT</text>
  <text x="30" y="270" font-size="11" fill="#888" font-weight="bold">PROCESSING</text>
  <text x="30" y="430" font-size="11" fill="#888" font-weight="bold">BACKEND</text>
  <text x="30" y="560" font-size="11" fill="#888" font-weight="bold">DATA</text>

  <!-- ===== LAYER BANDS ===== -->
  <rect x="20" y="60" width="860" height="120" rx="8" fill="#E3EDF7" opacity="0.5"/>
  <rect x="20" y="220" width="860" height="120" rx="8" fill="#E8F5E9" opacity="0.5"/>
  <rect x="20" y="380" width="860" height="120" rx="8" fill="#FFF3E0" opacity="0.5"/>
  <rect x="20" y="510" width="860" height="90" rx="8" fill="#F3E5F5" opacity="0.5"/>

  <!-- ===== CLIENT LAYER ===== -->
  <!-- Mobile App box -->
  <rect x="80" y="75" width="160" height="90" rx="10" fill="#2E75B6" />
  <text x="160" y="108" text-anchor="middle" font-size="13" font-weight="bold" fill="white">📱 Mobile App</text>
  <text x="160" y="126" text-anchor="middle" font-size="10" fill="#D0E8FF">Flutter (iOS / Android)</text>
  <text x="160" y="142" text-anchor="middle" font-size="10" fill="#D0E8FF">Camera View + AR Overlay</text>

  <!-- AR Overlay box -->
  <rect x="300" y="75" width="160" height="90" rx="10" fill="#1F4E79"/>
  <text x="380" y="108" text-anchor="middle" font-size="13" font-weight="bold" fill="white">🥽 AR Renderer</text>
  <text x="380" y="126" text-anchor="middle" font-size="10" fill="#D0E8FF">ARCore / ARKit</text>
  <text x="380" y="142" text-anchor="middle" font-size="10" fill="#D0E8FF">Overlay social info</text>

  <!-- Auth UI -->
  <rect x="520" y="75" width="160" height="90" rx="10" fill="#2E75B6"/>
  <text x="600" y="108" text-anchor="middle" font-size="13" font-weight="bold" fill="white">🔐 Auth UI</text>
  <text x="600" y="126" text-anchor="middle" font-size="10" fill="#D0E8FF">Login / Sign Up</text>
  <text x="600" y="142" text-anchor="middle" font-size="10" fill="#D0E8FF">Privacy Settings</text>

  <!-- Privacy Toggle -->
  <rect x="740" y="75" width="120" height="90" rx="10" fill="#1F4E79"/>
  <text x="800" y="108" text-anchor="middle" font-size="12" font-weight="bold" fill="white">👁 Visibility</text>
  <text x="800" y="126" text-anchor="middle" font-size="10" fill="#D0E8FF">Online / Offline</text>
  <text x="800" y="142" text-anchor="middle" font-size="10" fill="#D0E8FF">Toggle</text>

  <!-- ===== ARROWS: Client → Processing ===== -->
  <!-- Mobile App → Face Detection -->
  <line x1="160" y1="165" x2="160" y2="228" stroke="#2E75B6" stroke-width="2" marker-end="url(#arr-blue)"/>
  <text x="168" y="202" font-size="9" fill="#555">Camera frames</text>

  <!-- AR Renderer ↔ Face Detection -->
  <line x1="380" y1="165" x2="300" y2="228" stroke="#2E75B6" stroke-width="2" marker-end="url(#arr-blue)"/>
  <text x="318" y="205" font-size="9" fill="#555">Matched data</text>

  <!-- ===== PROCESSING LAYER ===== -->
  <!-- Face Detection -->
  <rect x="80" y="235" width="200" height="90" rx="10" fill="#388E3C"/>
  <text x="180" y="268" text-anchor="middle" font-size="13" font-weight="bold" fill="white">🎯 Face Detection</text>
  <text x="180" y="286" text-anchor="middle" font-size="10" fill="#C8E6C9">Google ML Kit</text>
  <text x="180" y="302" text-anchor="middle" font-size="10" fill="#C8E6C9">Detect + crop face</text>

  <!-- Face Recognition -->
  <rect x="340" y="235" width="200" height="90" rx="10" fill="#2E7D32"/>
  <text x="440" y="268" text-anchor="middle" font-size="13" font-weight="bold" fill="white">🧠 Face Recognition</text>
  <text x="440" y="286" text-anchor="middle" font-size="10" fill="#C8E6C9">TensorFlow Lite</text>
  <text x="440" y="302" text-anchor="middle" font-size="10" fill="#C8E6C9">Match to registered user</text>

  <!-- Profile Lookup -->
  <rect x="600" y="235" width="200" height="90" rx="10" fill="#388E3C"/>
  <text x="700" y="268" text-anchor="middle" font-size="13" font-weight="bold" fill="white">🔍 Profile Lookup</text>
  <text x="700" y="286" text-anchor="middle" font-size="10" fill="#C8E6C9">Fetch matched user data</text>
  <text x="700" y="302" text-anchor="middle" font-size="10" fill="#C8E6C9">Check visibility setting</text>

  <!-- Arrows within Processing -->
  <line x1="280" y1="280" x2="340" y2="280" stroke="#388E3C" stroke-width="2" marker-end="url(#arr-green)"/>
  <line x1="540" y1="280" x2="600" y2="280" stroke="#388E3C" stroke-width="2" marker-end="url(#arr-green)"/>
  <text x="290" y="273" font-size="9" fill="#555">Face embed.</text>
  <text x="549" y="273" font-size="9" fill="#555">User ID</text>

  <!-- Processing → Backend -->
  <line x1="440" y1="325" x2="440" y2="388" stroke="#388E3C" stroke-width="2" marker-end="url(#arr-green)"/>
  <text x="448" y="362" font-size="9" fill="#555">Query</text>

  <!-- ===== BACKEND LAYER ===== -->
  <!-- Firebase Auth -->
  <rect x="80" y="395" width="160" height="90" rx="10" fill="#E65100"/>
  <text x="160" y="428" text-anchor="middle" font-size="13" font-weight="bold" fill="white">🔑 Firebase Auth</text>
  <text x="160" y="446" text-anchor="middle" font-size="10" fill="#FFE0B2">Email / OAuth</text>
  <text x="160" y="462" text-anchor="middle" font-size="10" fill="#FFE0B2">Session management</text>

  <!-- Firestore -->
  <rect x="300" y="395" width="160" height="90" rx="10" fill="#BF360C"/>
  <text x="380" y="428" text-anchor="middle" font-size="13" font-weight="bold" fill="white">🗄 Firestore DB</text>
  <text x="380" y="446" text-anchor="middle" font-size="10" fill="#FFE0B2">User profiles</text>
  <text x="380" y="462" text-anchor="middle" font-size="10" fill="#FFE0B2">Visibility settings</text>

  <!-- Cloud Functions -->
  <rect x="520" y="395" width="160" height="90" rx="10" fill="#E65100"/>
  <text x="600" y="425" text-anchor="middle" font-size="13" font-weight="bold" fill="white">⚙️ Cloud</text>
  <text x="600" y="443" text-anchor="middle" font-size="13" font-weight="bold" fill="white">Functions</text>
  <text x="600" y="462" text-anchor="middle" font-size="10" fill="#FFE0B2">Node.js API logic</text>

  <!-- Firebase Storage -->
  <rect x="740" y="395" width="120" height="90" rx="10" fill="#BF360C"/>
  <text x="800" y="428" text-anchor="middle" font-size="12" font-weight="bold" fill="white">☁️ Storage</text>
  <text x="800" y="446" text-anchor="middle" font-size="10" fill="#FFE0B2">Profile photos</text>
  <text x="800" y="462" text-anchor="middle" font-size="10" fill="#FFE0B2">Face encodings</text>

  <!-- Backend → Data -->
  <line x1="380" y1="485" x2="380" y2="518" stroke="#BF360C" stroke-width="2" marker-end="url(#arr-orange)"/>
  <line x1="600" y1="485" x2="600" y2="518" stroke="#E65100" stroke-width="2" marker-end="url(#arr-orange)"/>
  <line x1="800" y1="485" x2="720" y2="518" stroke="#BF360C" stroke-width="2" marker-end="url(#arr-orange)"/>

  <!-- ===== DATA LAYER ===== -->
  <!-- Users table -->
  <rect x="80" y="522" width="180" height="65" rx="10" fill="#7B1FA2"/>
  <text x="170" y="548" text-anchor="middle" font-size="12" font-weight="bold" fill="white">👤 Users</text>
  <text x="170" y="565" text-anchor="middle" font-size="10" fill="#E1BEE7">uid, name, email, photo</text>
  <text x="170" y="579" text-anchor="middle" font-size="10" fill="#E1BEE7">face_encoding, status</text>

  <!-- Social Profiles table -->
  <rect x="310" y="522" width="200" height="65" rx="10" fill="#6A1B9A"/>
  <text x="410" y="548" text-anchor="middle" font-size="12" font-weight="bold" fill="white">🔗 Social Profiles</text>
  <text x="410" y="565" text-anchor="middle" font-size="10" fill="#E1BEE7">instagram, linkedin</text>
  <text x="410" y="579" text-anchor="middle" font-size="10" fill="#E1BEE7">interests, contact_link</text>

  <!-- Visibility Settings -->
  <rect x="560" y="522" width="200" height="65" rx="10" fill="#7B1FA2"/>
  <text x="660" y="548" text-anchor="middle" font-size="12" font-weight="bold" fill="white">🛡 Visibility Settings</text>
  <text x="660" y="565" text-anchor="middle" font-size="10" fill="#E1BEE7">is_online, visible_fields</text>
  <text x="660" y="579" text-anchor="middle" font-size="10" fill="#E1BEE7">blocked_users</text>

  <!-- ===== LEGEND ===== -->
  <rect x="760" y="520" width="115" height="70" rx="6" fill="white" stroke="#CCC" stroke-width="1"/>
  <text x="817" y="537" text-anchor="middle" font-size="10" font-weight="bold" fill="#333">Legend</text>
  <rect x="768" y="544" width="12" height="8" rx="2" fill="#2E75B6"/>
  <text x="785" y="552" font-size="9" fill="#333">Client Layer</text>
  <rect x="768" y="557" width="12" height="8" rx="2" fill="#388E3C"/>
  <text x="785" y="565" font-size="9" fill="#333">Processing Layer</text>
  <rect x="768" y="570" width="12" height="8" rx="2" fill="#E65100"/>
  <text x="785" y="578" font-size="9" fill="#333">Backend Layer</text>

  <!-- ===== ARROW MARKERS ===== -->
  <defs>
    <marker id="arr-blue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#2E75B6"/>
    </marker>
    <marker id="arr-green" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#388E3C"/>
    </marker>
    <marker id="arr-orange" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#E65100"/>
    </marker>
  </defs>
</svg>
