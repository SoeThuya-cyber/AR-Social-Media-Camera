<svg viewBox="0 0 960 640" xmlns="http://www.w3.org/2000/svg" role="img" font-family="Arial, sans-serif">
  <title>AR Social Media Camera – Database Schema</title>
  <desc>Firestore database schema showing four collections: Users, SocialProfiles, VisibilitySettings, and Connections with their fields and relationships.</desc>

  <rect width="960" height="640" fill="#F8F9FA" rx="12"/>
  <text x="480" y="38" text-anchor="middle" font-size="18" font-weight="bold" fill="#1F4E79">AR Social Media Camera — Database Schema (Firestore)</text>

  <!-- ===== USERS COLLECTION ===== -->
  <rect x="40" y="60" width="220" height="280" rx="10" fill="white" stroke="#2E75B6" stroke-width="2"/>
  <rect x="40" y="60" width="220" height="40" rx="10" fill="#2E75B6"/>
  <rect x="40" y="88" width="220" height="12" fill="#2E75B6"/>
  <text x="150" y="86" text-anchor="middle" font-size="14" font-weight="bold" fill="white">👤 users</text>
  <!-- PK -->
  <text x="55" y="120" font-size="11" font-weight="bold" fill="#2E75B6">🔑 uid</text>
  <text x="200" y="120" text-anchor="end" font-size="10" fill="#888">string (PK)</text>
  <line x1="50" y1="126" x2="250" y2="126" stroke="#EEE" stroke-width="1"/>
  <text x="55" y="144" font-size="11" fill="#333">displayName</text>
  <text x="250" y="144" text-anchor="end" font-size="10" fill="#888">string</text>
  <line x1="50" y1="150" x2="250" y2="150" stroke="#EEE" stroke-width="1"/>
  <text x="55" y="168" font-size="11" fill="#333">email</text>
  <text x="250" y="168" text-anchor="end" font-size="10" fill="#888">string</text>
  <line x1="50" y1="174" x2="250" y2="174" stroke="#EEE" stroke-width="1"/>
  <text x="55" y="192" font-size="11" fill="#333">photoURL</text>
  <text x="250" y="192" text-anchor="end" font-size="10" fill="#888">string</text>
  <line x1="50" y1="198" x2="250" y2="198" stroke="#EEE" stroke-width="1"/>
  <text x="55" y="216" font-size="11" fill="#333">faceEncoding</text>
  <text x="250" y="216" text-anchor="end" font-size="10" fill="#888">array&lt;float&gt;</text>
  <line x1="50" y1="222" x2="250" y2="222" stroke="#EEE" stroke-width="1"/>
  <text x="55" y="240" font-size="11" fill="#333">createdAt</text>
  <text x="250" y="240" text-anchor="end" font-size="10" fill="#888">timestamp</text>
  <line x1="50" y1="246" x2="250" y2="246" stroke="#EEE" stroke-width="1"/>
  <text x="55" y="264" font-size="11" fill="#333">lastLogin</text>
  <text x="250" y="264" text-anchor="end" font-size="10" fill="#888">timestamp</text>
  <line x1="50" y1="270" x2="250" y2="270" stroke="#EEE" stroke-width="1"/>
  <text x="55" y="288" font-size="11" fill="#333">isVerified</text>
  <text x="250" y="288" text-anchor="end" font-size="10" fill="#888">boolean</text>
  <line x1="50" y1="294" x2="250" y2="294" stroke="#EEE" stroke-width="1"/>
  <text x="55" y="326" font-size="10" fill="#888" font-style="italic">Sub-collection: socialProfile</text>
  <text x="55" y="342" font-size="10" fill="#888" font-style="italic">Sub-collection: visibilitySettings</text>

  <!-- ===== SOCIAL PROFILES ===== -->
  <rect x="310" y="60" width="240" height="280" rx="10" fill="white" stroke="#388E3C" stroke-width="2"/>
  <rect x="310" y="60" width="240" height="40" rx="10" fill="#388E3C"/>
  <rect x="310" y="88" width="240" height="12" fill="#388E3C"/>
  <text x="430" y="86" text-anchor="middle" font-size="14" font-weight="bold" fill="white">🔗 socialProfiles</text>
  <text x="325" y="120" font-size="11" font-weight="bold" fill="#388E3C">🔑 profileId</text>
  <text x="540" y="120" text-anchor="end" font-size="10" fill="#888">string (PK)</text>
  <line x1="320" y1="126" x2="540" y2="126" stroke="#EEE" stroke-width="1"/>
  <text x="325" y="144" font-size="11" font-weight="bold" fill="#888">🔗 userId</text>
  <text x="540" y="144" text-anchor="end" font-size="10" fill="#888">string (FK)</text>
  <line x1="320" y1="150" x2="540" y2="150" stroke="#EEE" stroke-width="1"/>
  <text x="325" y="168" font-size="11" fill="#333">instagramHandle</text>
  <text x="540" y="168" text-anchor="end" font-size="10" fill="#888">string</text>
  <line x1="320" y1="174" x2="540" y2="174" stroke="#EEE" stroke-width="1"/>
  <text x="325" y="192" font-size="11" fill="#333">linkedinURL</text>
  <text x="540" y="192" text-anchor="end" font-size="10" fill="#888">string</text>
  <line x1="320" y1="198" x2="540" y2="198" stroke="#EEE" stroke-width="1"/>
  <text x="325" y="216" font-size="11" fill="#333">twitterHandle</text>
  <text x="540" y="216" text-anchor="end" font-size="10" fill="#888">string</text>
  <line x1="320" y1="222" x2="540" y2="222" stroke="#EEE" stroke-width="1"/>
  <text x="325" y="240" font-size="11" fill="#333">interests</text>
  <text x="540" y="240" text-anchor="end" font-size="10" fill="#888">array&lt;string&gt;</text>
  <line x1="320" y1="246" x2="540" y2="246" stroke="#EEE" stroke-width="1"/>
  <text x="325" y="264" font-size="11" fill="#333">contactEmail</text>
  <text x="540" y="264" text-anchor="end" font-size="10" fill="#888">string</text>
  <line x1="320" y1="270" x2="540" y2="270" stroke="#EEE" stroke-width="1"/>
  <text x="325" y="288" font-size="11" fill="#333">bio</text>
  <text x="540" y="288" text-anchor="end" font-size="10" fill="#888">string</text>
  <line x1="320" y1="294" x2="540" y2="294" stroke="#EEE" stroke-width="1"/>
  <text x="325" y="316" font-size="11" fill="#333">updatedAt</text>
  <text x="540" y="316" text-anchor="end" font-size="10" fill="#888">timestamp</text>

  <!-- ===== VISIBILITY SETTINGS ===== -->
  <rect x="600" y="60" width="240" height="280" rx="10" fill="white" stroke="#7B1FA2" stroke-width="2"/>
  <rect x="600" y="60" width="240" height="40" rx="10" fill="#7B1FA2"/>
  <rect x="600" y="88" width="240" height="12" fill="#7B1FA2"/>
  <text x="720" y="86" text-anchor="middle" font-size="13" font-weight="bold" fill="white">🛡 visibilitySettings</text>
  <text x="615" y="120" font-size="11" font-weight="bold" fill="#7B1FA2">🔑 settingId</text>
  <text x="830" y="120" text-anchor="end" font-size="10" fill="#888">string (PK)</text>
  <line x1="610" y1="126" x2="830" y2="126" stroke="#EEE" stroke-width="1"/>
  <text x="615" y="144" font-size="11" font-weight="bold" fill="#888">🔗 userId</text>
  <text x="830" y="144" text-anchor="end" font-size="10" fill="#888">string (FK)</text>
  <line x1="610" y1="150" x2="830" y2="150" stroke="#EEE" stroke-width="1"/>
  <text x="615" y="168" font-size="11" fill="#333">isOnline</text>
  <text x="830" y="168" text-anchor="end" font-size="10" fill="#888">boolean</text>
  <line x1="610" y1="174" x2="830" y2="174" stroke="#EEE" stroke-width="1"/>
  <text x="615" y="192" font-size="11" fill="#333">showName</text>
  <text x="830" y="192" text-anchor="end" font-size="10" fill="#888">boolean</text>
  <line x1="610" y1="198" x2="830" y2="198" stroke="#EEE" stroke-width="1"/>
  <text x="615" y="216" font-size="11" fill="#333">showSocials</text>
  <text x="830" y="216" text-anchor="end" font-size="10" fill="#888">boolean</text>
  <line x1="610" y1="222" x2="830" y2="222" stroke="#EEE" stroke-width="1"/>
  <text x="615" y="240" font-size="11" fill="#333">showInterests</text>
  <text x="830" y="240" text-anchor="end" font-size="10" fill="#888">boolean</text>
  <line x1="610" y1="246" x2="830" y2="246" stroke="#EEE" stroke-width="1"/>
  <text x="615" y="264" font-size="11" fill="#333">blockedUsers</text>
  <text x="830" y="264" text-anchor="end" font-size="10" fill="#888">array&lt;string&gt;</text>
  <line x1="610" y1="270" x2="830" y2="270" stroke="#EEE" stroke-width="1"/>
  <text x="615" y="288" font-size="11" fill="#333">allowedViewers</text>
  <text x="830" y="288" text-anchor="end" font-size="10" fill="#888">array&lt;string&gt;</text>
  <line x1="610" y1="294" x2="830" y2="294" stroke="#EEE" stroke-width="1"/>
  <text x="615" y="312" font-size="11" fill="#333">updatedAt</text>
  <text x="830" y="312" text-anchor="end" font-size="10" fill="#888">timestamp</text>

  <!-- ===== CONNECTIONS ===== -->
  <rect x="200" y="420" width="560" height="175" rx="10" fill="white" stroke="#E65100" stroke-width="2"/>
  <rect x="200" y="420" width="560" height="40" rx="10" fill="#E65100"/>
  <rect x="200" y="448" width="560" height="12" fill="#E65100"/>
  <text x="480" y="446" text-anchor="middle" font-size="14" font-weight="bold" fill="white">🤝 connections</text>
  <!-- Fields in 2 columns -->
  <text x="215" y="480" font-size="11" font-weight="bold" fill="#E65100">🔑 connectionId</text>
  <text x="470" y="480" text-anchor="end" font-size="10" fill="#888">string (PK)</text>
  <text x="490" y="480" font-size="11" font-weight="bold" fill="#888">🔗 fromUserId</text>
  <text x="745" y="480" text-anchor="end" font-size="10" fill="#888">string (FK → users)</text>
  <line x1="210" y1="486" x2="750" y2="486" stroke="#EEE" stroke-width="1"/>
  <text x="215" y="504" font-size="11" font-weight="bold" fill="#888">🔗 toUserId</text>
  <text x="470" y="504" text-anchor="end" font-size="10" fill="#888">string (FK → users)</text>
  <text x="490" y="504" font-size="11" fill="#333">status</text>
  <text x="745" y="504" text-anchor="end" font-size="10" fill="#888">enum: pending|accepted|blocked</text>
  <line x1="210" y1="510" x2="750" y2="510" stroke="#EEE" stroke-width="1"/>
  <text x="215" y="528" font-size="11" fill="#333">type</text>
  <text x="470" y="528" text-anchor="end" font-size="10" fill="#888">enum: friend|follower</text>
  <text x="490" y="528" font-size="11" fill="#333">createdAt</text>
  <text x="745" y="528" text-anchor="end" font-size="10" fill="#888">timestamp</text>
  <line x1="210" y1="534" x2="750" y2="534" stroke="#EEE" stroke-width="1"/>
  <text x="215" y="552" font-size="11" fill="#333">initiatedViaAR</text>
  <text x="470" y="552" text-anchor="end" font-size="10" fill="#888">boolean</text>
  <text x="490" y="552" font-size="11" fill="#333">updatedAt</text>
  <text x="745" y="552" text-anchor="end" font-size="10" fill="#888">timestamp</text>
  <line x1="210" y1="558" x2="750" y2="558" stroke="#EEE" stroke-width="1"/>
  <text x="215" y="580" font-size="10" fill="#888" font-style="italic">Stores all friend requests and follows initiated through AR or normal app interaction.</text>

  <!-- ===== RELATIONSHIP LINES ===== -->
  <!-- Users → SocialProfiles -->
  <line x1="260" y1="200" x2="310" y2="200" stroke="#888" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr-rel)"/>
  <text x="263" y="192" font-size="9" fill="#888">1</text>
  <text x="296" y="192" font-size="9" fill="#888">1</text>

  <!-- Users → VisibilitySettings -->
  <line x1="260" y1="240" x2="600" y2="240" stroke="#888" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr-rel)"/>
  <text x="263" y="232" font-size="9" fill="#888">1</text>
  <text x="585" y="232" font-size="9" fill="#888">1</text>

  <!-- Users → Connections -->
  <line x1="150" y1="340" x2="150" y2="508" stroke="#888" stroke-width="1.5" stroke-dasharray="5,3"/>
  <line x1="150" y1="508" x2="200" y2="508" stroke="#888" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr-rel)"/>
  <text x="155" y="430" font-size="9" fill="#888">1:N</text>

  <defs>
    <marker id="arr-rel" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#888"/>
    </marker>
  </defs>

  <!-- Legend -->
  <rect x="40" y="420" width="140" height="80" rx="6" fill="white" stroke="#CCC" stroke-width="1"/>
  <text x="110" y="438" text-anchor="middle" font-size="10" font-weight="bold" fill="#333">Legend</text>
  <text x="52" y="454" font-size="10" fill="#333">🔑 Primary Key</text>
  <text x="52" y="470" font-size="10" fill="#333">🔗 Foreign Key</text>
  <line x1="52" y1="482" x2="80" y2="482" stroke="#888" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="85" y="486" font-size="10" fill="#333">Relationship</text>
</svg>
