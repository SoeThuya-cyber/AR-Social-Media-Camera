<svg viewBox="0 0 960 680" xmlns="http://www.w3.org/2000/svg" role="img" font-family="Arial, sans-serif">
  <title>AR Social Media Camera – Use Case Diagram</title>
  <desc>UML Use Case Diagram showing three actors (Registered User, AR Viewer, Admin) and their interactions with the AR Social Media Camera system.</desc>

  <rect width="960" height="680" fill="#F8F9FA" rx="12"/>
  <text x="480" y="36" text-anchor="middle" font-size="18" font-weight="bold" fill="#1F4E79">AR Social Media Camera — Use Case Diagram</text>

  <!-- ===== SYSTEM BOUNDARY ===== -->
  <rect x="180" y="55" width="620" height="580" rx="12" fill="white" stroke="#2E75B6" stroke-width="2" stroke-dasharray="8,4"/>
  <text x="490" y="78" text-anchor="middle" font-size="13" font-weight="bold" fill="#2E75B6">AR Social Media Camera System</text>

  <!-- ===== USE CASE ELLIPSES ===== -->
  <!-- Auth group -->
  <ellipse cx="370" cy="130" rx="100" ry="24" fill="#E3EDF7" stroke="#2E75B6" stroke-width="1.5"/>
  <text x="370" y="134" text-anchor="middle" font-size="11" fill="#1F4E79">Register / Sign Up</text>

  <ellipse cx="600" cy="130" rx="100" ry="24" fill="#E3EDF7" stroke="#2E75B6" stroke-width="1.5"/>
  <text x="600" y="134" text-anchor="middle" font-size="11" fill="#1F4E79">Log In / Log Out</text>

  <!-- Profile group -->
  <ellipse cx="370" cy="210" rx="110" ry="24" fill="#E8F5E9" stroke="#388E3C" stroke-width="1.5"/>
  <text x="370" y="214" text-anchor="middle" font-size="11" fill="#2E7D32">Set Up Social Profile</text>

  <ellipse cx="600" cy="210" rx="110" ry="24" fill="#E8F5E9" stroke="#388E3C" stroke-width="1.5"/>
  <text x="600" y="214" text-anchor="middle" font-size="11" fill="#2E7D32">Edit Profile Info</text>

  <!-- Privacy group -->
  <ellipse cx="370" cy="290" rx="115" ry="24" fill="#F3E5F5" stroke="#7B1FA2" stroke-width="1.5"/>
  <text x="370" y="294" text-anchor="middle" font-size="11" fill="#6A1B9A">Toggle Online / Offline</text>

  <ellipse cx="600" cy="290" rx="115" ry="24" fill="#F3E5F5" stroke="#7B1FA2" stroke-width="1.5"/>
  <text x="600" y="294" text-anchor="middle" font-size="11" fill="#6A1B9A">Manage Visibility Settings</text>

  <!-- AR group -->
  <ellipse cx="370" cy="370" rx="115" ry="24" fill="#FFF3E0" stroke="#E65100" stroke-width="1.5"/>
  <text x="370" y="374" text-anchor="middle" font-size="11" fill="#BF360C">Open AR Camera View</text>

  <ellipse cx="600" cy="370" rx="120" ry="24" fill="#FFF3E0" stroke="#E65100" stroke-width="1.5"/>
  <text x="600" y="374" text-anchor="middle" font-size="11" fill="#BF360C">View Overlay on Person</text>

  <!-- Social actions -->
  <ellipse cx="370" cy="450" rx="115" ry="24" fill="#FFF3E0" stroke="#E65100" stroke-width="1.5"/>
  <text x="370" y="454" text-anchor="middle" font-size="11" fill="#BF360C">Send Friend Request</text>

  <ellipse cx="600" cy="450" rx="115" ry="24" fill="#FFF3E0" stroke="#E65100" stroke-width="1.5"/>
  <text x="600" y="454" text-anchor="middle" font-size="11" fill="#BF360C">Follow Profile via AR</text>

  <!-- Admin -->
  <ellipse cx="370" cy="540" rx="115" ry="24" fill="#FCE4EC" stroke="#C62828" stroke-width="1.5"/>
  <text x="370" y="544" text-anchor="middle" font-size="11" fill="#B71C1C">Manage User Accounts</text>

  <ellipse cx="600" cy="540" rx="115" ry="24" fill="#FCE4EC" stroke="#C62828" stroke-width="1.5"/>
  <text x="600" y="544" text-anchor="middle" font-size="11" fill="#B71C1C">View System Reports</text>

  <!-- ===== ACTORS ===== -->
  <!-- Registered User (left) -->
  <circle cx="80" cy="310" r="20" fill="none" stroke="#1F4E79" stroke-width="2"/>
  <line x1="80" y1="330" x2="80" y2="390" stroke="#1F4E79" stroke-width="2"/>
  <line x1="80" y1="350" x2="50" y2="370" stroke="#1F4E79" stroke-width="2"/>
  <line x1="80" y1="350" x2="110" y2="370" stroke="#1F4E79" stroke-width="2"/>
  <line x1="80" y1="390" x2="55" y2="420" stroke="#1F4E79" stroke-width="2"/>
  <line x1="80" y1="390" x2="105" y2="420" stroke="#1F4E79" stroke-width="2"/>
  <text x="80" y="438" text-anchor="middle" font-size="11" font-weight="bold" fill="#1F4E79">Registered</text>
  <text x="80" y="452" text-anchor="middle" font-size="11" font-weight="bold" fill="#1F4E79">User</text>

  <!-- AR Viewer (right) -->
  <circle cx="880" cy="370" r="20" fill="none" stroke="#388E3C" stroke-width="2"/>
  <line x1="880" y1="390" x2="880" y2="450" stroke="#388E3C" stroke-width="2"/>
  <line x1="880" y1="410" x2="850" y2="430" stroke="#388E3C" stroke-width="2"/>
  <line x1="880" y1="410" x2="910" y2="430" stroke="#388E3C" stroke-width="2"/>
  <line x1="880" y1="450" x2="855" y2="480" stroke="#388E3C" stroke-width="2"/>
  <line x1="880" y1="450" x2="905" y2="480" stroke="#388E3C" stroke-width="2"/>
  <text x="880" y="498" text-anchor="middle" font-size="11" font-weight="bold" fill="#388E3C">AR Viewer</text>

  <!-- Admin (bottom right) -->
  <circle cx="880" cy="530" r="20" fill="none" stroke="#C62828" stroke-width="2"/>
  <line x1="880" y1="550" x2="880" y2="610" stroke="#C62828" stroke-width="2"/>
  <line x1="880" y1="570" x2="850" y2="590" stroke="#C62828" stroke-width="2"/>
  <line x1="880" y1="570" x2="910" y2="590" stroke="#C62828" stroke-width="2"/>
  <line x1="880" y1="610" x2="855" y2="640" stroke="#C62828" stroke-width="2"/>
  <line x1="880" y1="610" x2="905" y2="640" stroke="#C62828" stroke-width="2"/>
  <text x="880" y="655" text-anchor="middle" font-size="11" font-weight="bold" fill="#C62828">Admin</text>

  <!-- ===== ASSOCIATION LINES ===== -->
  <!-- Registered User → use cases -->
  <line x1="100" y1="295" x2="255" y2="134" stroke="#1F4E79" stroke-width="1.2"/>
  <line x1="100" y1="300" x2="255" y2="215" stroke="#1F4E79" stroke-width="1.2"/>
  <line x1="100" y1="310" x2="252" y2="292" stroke="#1F4E79" stroke-width="1.2"/>
  <line x1="100" y1="315" x2="253" y2="450" stroke="#1F4E79" stroke-width="1.2"/>
  <line x1="108" y1="290" x2="488" y2="134" stroke="#1F4E79" stroke-width="1.2"/>
  <line x1="108" y1="295" x2="488" y2="210" stroke="#1F4E79" stroke-width="1.2"/>
  <line x1="108" y1="300" x2="485" y2="290" stroke="#1F4E79" stroke-width="1.2"/>

  <!-- AR Viewer → use cases -->
  <line x1="860" y1="360" x2="722" y2="374" stroke="#388E3C" stroke-width="1.2"/>
  <line x1="860" y1="365" x2="722" y2="454" stroke="#388E3C" stroke-width="1.2"/>
  <line x1="862" y1="355" x2="720" y2="294" stroke="#388E3C" stroke-width="1.2"/>
  <line x1="860" y1="370" x2="718" y2="370" stroke="#388E3C" stroke-width="1.2"/>

  <!-- Admin → use cases -->
  <line x1="862" y1="520" x2="718" y2="542" stroke="#C62828" stroke-width="1.2"/>
  <line x1="862" y1="525" x2="488" y2="542" stroke="#C62828" stroke-width="1.2"/>

  <!-- include/extend arrows (dashed) -->
  <!-- View Overlay «include» Face Detection -->
  <line x1="600" y1="346" x2="600" y2="314" stroke="#888" stroke-width="1" stroke-dasharray="5,3" marker-end="url(#arr-inc)"/>
  <text x="608" y="333" font-size="9" fill="#888">«include»</text>
  <!-- Open AR Camera «include» View Overlay -->
  <line x1="487" y1="370" x2="478" y2="370" stroke="#888" stroke-width="1" stroke-dasharray="5,3" marker-end="url(#arr-inc2)"/>

  <defs>
    <marker id="arr-inc" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#888"/>
    </marker>
    <marker id="arr-inc2" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#888"/>
    </marker>
  </defs>

  <!-- ===== LEGEND ===== -->
  <rect x="190" y="595" width="340" height="32" rx="6" fill="white" stroke="#CCC" stroke-width="1"/>
  <line x1="205" y1="611" x2="240" y2="611" stroke="#888" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="248" y="615" font-size="10" fill="#555">«include» / «extend» relationship</text>
  <line x1="300" y1="611" x2="320" y2="611" stroke="#1F4E79" stroke-width="1.5"/>
  <text x="325" y="602" font-size="10" fill="#555" visibility="hidden"> </text>
</svg>
